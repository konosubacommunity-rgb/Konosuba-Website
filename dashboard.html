<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Aqua Bot</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7040c0;
            --dark-bg: #0a0415;
            --darker-bg: #050210;
            --text-primary: #ffffff;
            --text-secondary: #d8c0f8;
            --cyan: #00d9ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(112, 64, 192, 0.2);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--text-primary);
        }

        .sync-status {
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 20px;
            color: var(--cyan);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logout-btn {
            padding: 0.6rem 1.5rem;
            background: rgba(255, 107, 107, 0.15);
            color: #ff9999;
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.25);
        }

        .profile-card {
            background: linear-gradient(135deg, rgba(112, 64, 192, 0.15) 0%, rgba(0, 217, 255, 0.05) 100%);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .profile-header {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--cyan);
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.1) 0%, rgba(112, 64, 192, 0.1) 100%);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 2rem 0 1rem;
            color: var(--cyan);
        }

        .activity-log {
            background: linear-gradient(135deg, rgba(112, 64, 192, 0.08) 0%, rgba(0, 217, 255, 0.08) 100%);
            border: 1px solid rgba(0, 217, 255, 0.15);
            border-radius: 12px;
            padding: 1.5rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .activity-item {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(0, 217, 255, 0.1);
        }

        .activity-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .activity-icon {
            font-size: 1.5rem;
            min-width: 2rem;
            text-align: center;
        }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .activity-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .activity-time {
            font-size: 0.75rem;
            color: rgba(216, 192, 248, 0.5);
            margin-top: 0.25rem;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 2rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span>🧿</span>
                <span>Aqua Bot</span>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="sync-status">
                    <span class="loading-spinner"></span>
                    <span id="syncText">Syncing...</span>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="profile-card">
            <div class="profile-header">👤</div>
            <div class="profile-name" id="username">Loading...</div>
            <div style="color: var(--text-secondary); font-size: 0.9rem;" id="userPhone">-</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">💰 Wallet</div>
                <div class="stat-value" id="wallet">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🏦 Bank</div>
                <div class="stat-value" id="bank">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">⭐ Level</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">⚡ XP</div>
                <div class="stat-value" id="xp">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🔥 Streak</div>
                <div class="stat-value" id="streak">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💎 Net Worth</div>
                <div class="stat-value" id="networth">$0</div>
            </div>
        </div>

        <div class="section-title">📊 Activity Log</div>
        <div class="activity-log" id="activityLog">
            <div class="empty-state">No activities yet. Start playing!</div>
        </div>
    </div>

    <script>
        const API_URL = 'https://konosuba-bot.onrender.com/api';
        let currentUser = null;
        let syncInterval = null;

        function formatMoney(n) {
            return '$' + Number(n).toLocaleString('en-US');
        }

        function formatTime(date) {
            const d = new Date(date);
            const now = new Date();
            const diff = now - d;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (seconds < 60) return 'just now';
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            return `${days}d ago`;
        }

        async function loadUserData() {
            try {
                const token = localStorage.getItem('token');
                const user = JSON.parse(localStorage.getItem('currentUser'));

                if (!token || !user) {
                    window.location.href = 'auth.html';
                    return;
                }

                currentUser = user;
                document.getElementById('username').textContent = user.username || 'User';
                document.getElementById('userPhone').textContent = `📱 ${user.phone}`;

                // Fetch latest data from API
                const response = await fetch(`${API_URL}/user/${user.phone}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem('token');
                        window.location.href = 'auth.html';
                    }
                    return;
                }

                const data = await response.json();

                // Update UI
                document.getElementById('wallet').textContent = formatMoney(data.wallet);
                document.getElementById('bank').textContent = formatMoney(data.bank);
                document.getElementById('level').textContent = data.level;
                document.getElementById('xp').textContent = `${data.xp}/${data.level * 100}`;
                document.getElementById('streak').textContent = data.streak;
                document.getElementById('networth').textContent = formatMoney(data.wallet + data.bank);
                document.getElementById('syncText').textContent = '✅ Synced';

                // Load activities
                await loadActivities(user.phone, token);

                // Reset sync status after 2 seconds
                setTimeout(() => {
                    document.getElementById('syncText').textContent = 'Syncing...';
                }, 2000);

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('syncText').textContent = '❌ Sync failed';
            }
        }

        async function loadActivities(phone, token) {
            try {
                const response = await fetch(`${API_URL}/user/${phone}/activity`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) return;

                const data = await response.json();
                const activities = data.activities || [];

                const activityLog = document.getElementById('activityLog');
                
                if (activities.length === 0) {
                    activityLog.innerHTML = '<div class="empty-state">No activities yet. Start playing!</div>';
                    return;
                }

                activityLog.innerHTML = activities
                    .slice()
                    .reverse()
                    .map(activity => `
                        <div class="activity-item">
                            <div class="activity-icon">${activity.icon || '📝'}</div>
                            <div class="activity-content">
                                <div class="activity-title">${activity.title || 'Activity'}</div>
                                <div class="activity-desc">${activity.desc || ''}</div>
                                <div class="activity-time">${formatTime(activity.timestamp)}</div>
                            </div>
                        </div>
                    `).join('');

            } catch (error) {
                console.error('Error loading activities:', error);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            window.location.href = 'auth.html';
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            // Sync every 3 seconds
            syncInterval = setInterval(loadUserData, 3000);
        });

        // Clear interval on page unload
        window.addEventListener('beforeunload', () => {
            if (syncInterval) clearInterval(syncInterval);
        });
    </script>
</body>
</html>
