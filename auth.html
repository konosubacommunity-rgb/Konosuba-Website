<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Aqua Bot</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7040c0;
            --primary-light: #9060d0;
            --dark-bg: #0a0415;
            --darker-bg: #050210;
            --text-primary: #ffffff;
            --text-secondary: #d8c0f8;
            --border: rgba(112, 64, 192, 0.2);
            --cyan: #00d9ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .login-container {
            background: linear-gradient(135deg, rgba(112, 64, 192, 0.1) 0%, rgba(0, 217, 255, 0.05) 100%);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 217, 255, 0.15);
            animation: slideUp 0.6s ease-out;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 15px rgba(0, 217, 255, 0.6));
        }

        .logo-section h1 {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--cyan) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .logo-section p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 217, 255, 0.08);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(216, 192, 248, 0.5);
        }

        input:focus {
            outline: none;
            background: rgba(0, 217, 255, 0.15);
            border-color: rgba(0, 217, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
        }

        .form-hint {
            font-size: 0.85rem;
            color: rgba(216, 192, 248, 0.7);
            margin-top: 0.5rem;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--cyan), #00b8cc);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.4);
            margin-bottom: 1rem;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 217, 255, 0.6);
        }

        .login-btn:active {
            transform: translateY(-1px);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        .toggle-mode {
            text-align: center;
            margin-top: 1rem;
        }

        .toggle-mode button {
            background: none;
            border: none;
            color: var(--cyan);
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .toggle-mode button:hover {
            color: #00b8cc;
        }

        .back-link {
            display: block;
            text-align: center;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .back-link:hover {
            color: var(--cyan);
        }

        .error-message {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff9999;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }

        .success-message {
            background: rgba(0, 212, 127, 0.1);
            border: 1px solid rgba(0, 212, 127, 0.3);
            color: #66ffcc;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }

            .logo-section h1 {
                font-size: 1.5rem;
            }

            .logo-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon">🧿</div>
            <h1>Aqua Bot</h1>
            <p id="modeText">Sign in to your account</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="form-group">
                <label for="whatsappNumber">WhatsApp Number</label>
                <input 
                    type="tel" 
                    id="whatsappNumber" 
                    name="whatsappNumber"
                    placeholder="234 (country code) + phone number"
                    required
                >
                <div class="form-hint">Example: 2341234567890 (with country code, no + or spaces)</div>
            </div>

            <div class="form-group" id="usernameGroup">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username"
                    placeholder="Choose your bot username"
                    required
                >
            </div>

            <div class="form-group" id="passwordGroup">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    placeholder="Enter password"
                    required
                >
            </div>

            <div class="form-group" id="countryGroup" style="display:none;">
                <label for="country">Country</label>
                <input 
                    type="text" 
                    id="country" 
                    name="country"
                    placeholder="NG, US, UK, etc"
                    value="NG"
                >
            </div>

            <button type="submit" class="login-btn">
                <span id="buttonText">Sign In</span>
                <span class="loading" id="loadingSpinner">
                    <span class="spinner"></span>Processing...
                </span>
            </button>
        </form>

        <div class="divider">or</div>

        <div class="toggle-mode">
            <button onclick="toggleMode()" id="toggleBtn">Don't have account? Sign Up</button>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        const API_URL = 'https://YOUR-RENDER-BOT-URL.onrender.com/api';
        let isSignupMode = false;

        function toggleMode() {
            isSignupMode = !isSignupMode;
            document.getElementById('modeText').textContent = isSignupMode ? 'Create your account' : 'Sign in to your account';
            document.getElementById('toggleBtn').textContent = isSignupMode ? 'Already have account? Sign In' : "Don't have account? Sign Up";
            document.getElementById('buttonText').textContent = isSignupMode ? 'Sign Up' : 'Sign In';
            document.getElementById('usernameGroup').style.display = isSignupMode ? 'block' : 'none';
            document.getElementById('countryGroup').style.display = isSignupMode ? 'block' : 'none';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        async function handleAuth(event) {
            event.preventDefault();

            const whatsappNumber = document.getElementById('whatsappNumber').value.trim();
            const password = document.getElementById('password').value.trim();
            const username = document.getElementById('username').value.trim();
            const country = document.getElementById('country').value.trim();
            
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const buttonText = document.getElementById('buttonText');
            const loadingSpinner = document.getElementById('loadingSpinner');

            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            if (!whatsappNumber || !password) {
                errorMessage.textContent = '❌ Please fill in all required fields';
                errorMessage.style.display = 'block';
                return;
            }

            if (whatsappNumber.length < 10) {
                errorMessage.textContent = '❌ Please enter a valid WhatsApp number';
                errorMessage.style.display = 'block';
                return;
            }

            if (isSignupMode && username.length < 3) {
                errorMessage.textContent = '❌ Username must be at least 3 characters';
                errorMessage.style.display = 'block';
                return;
            }

            buttonText.style.display = 'none';
            loadingSpinner.style.display = 'inline';

            try {
                const endpoint = isSignupMode ? '/auth/signup' : '/auth/login';
                const payload = isSignupMode 
                    ? { phone: whatsappNumber, username, password, country: country || 'NG' }
                    : { phone: whatsappNumber, password };

                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Authentication failed');
                }

                // Save token and user data
                localStorage.setItem('token', data.token);
                localStorage.setItem('currentUser', JSON.stringify({
                    phone: whatsappNumber,
                    username: data.user.username,
                    level: data.user.level,
                    wallet: data.user.wallet
                }));

                successMessage.textContent = `✅ ${isSignupMode ? 'Account created' : 'Login'} successful! Redirecting...`;
                successMessage.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                buttonText.style.display = 'inline';
                loadingSpinner.style.display = 'none';
                errorMessage.textContent = `❌ ${error.message}`;
                errorMessage.style.display = 'block';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
